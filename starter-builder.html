<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starter Builder - O Maestro dos Prompts</title>
    <!-- React & Babel for single-file demo -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Space+Mono&display=swap');

        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --primary: #eeff00;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --border: #333333;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #root {
            width: 100%;
            max-width: 900px;
        }

        .brutalist-card {
            background: var(--card);
            border: 2px solid var(--text);
            box-shadow: 8px 8px 0px var(--primary);
            padding: 40px;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 10px;
            line-height: 1;
            letter-spacing: -3px;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--primary);
            margin-bottom: 40px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .option-button {
            background: #1a1a1a;
            border: 2px solid var(--border);
            padding: 20px;
            color: var(--text);
            cursor: pointer;
            text-align: left;
            transition: all 0.1s;
        }

        .option-button:hover {
            border-color: #666;
        }

        .option-button.active {
            border-color: var(--primary);
            background: #222;
            box-shadow: 4px 4px 0px var(--primary);
            transform: translate(-2px, -2px);
        }

        .option-button h3 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .option-button p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.3;
        }

        .generate-btn {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: 4px solid #000;
            padding: 20px;
            font-size: 1.6rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 6px 6px 0px #000;
            transition: all 0.1s;
        }

        .generate-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0px #000;
        }

        .prompt-result {
            margin-top: 40px;
            background: #000;
            border: 2px dashed var(--primary);
            padding: 30px;
        }

        .prompt-text {
            white-space: pre-wrap;
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            color: #4ade80;
            max-height: 400px;
            overflow-y: auto;
            background: #0f172a;
            padding: 20px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const StarterBuilder = () => {
            const [design, setDesign] = useState('brutalist');
            const [layout, setLayout] = useState('kanban');
            const [features, setFeatures] = useState(['priorities']);
            const [showPrompt, setShowPrompt] = useState(false);

            const toggleFeature = (f) => {
                setFeatures(prev => prev.includes(f) ? prev.filter(item => item !== f) : [...prev, f]);
            };

            const generatePrompt = () => {
                return `[ROLE]
És um Senior Frontend Developer e Especialista em UI/UX com foco em Design Moderno de alto impacto. Constróis aplicações limpas, de alta performance e visualmente impressionantes.

[TASK]
Cria uma aplicação de "Gestor de Tarefas" totalmente funcional em React usando Tailwind CSS e Lucide React.

[REGRA DE OURO]
Toda a interface, labels, mensagens e botões DEVEM estar em Português de Portugal (PT-PT).

[DESIGN SPECIFICATIONS: ${design.toUpperCase()}]
${design === 'brutalist' ? '- Estética: Brutalismo Moderno. Fundo #000, cartões brancos, sombras duras 4px e acento Neon #EEFF00.' : ''}
${design === 'minimal' ? '- Estética: Minimalista. Tons de cinza claro, fundo off-white, visual leve e elegante.' : ''}
${design === 'glass' ? '- Estética: Glassmorphism. Transparências com blur, gradientes suaves e visual estilo Apple.' : ''}
${design === 'gastro' ? '- Estética: Neo-Gastro Luxo. Fundo preto profundo #050505 e detalhes em Ouro #D4AF37.' : ''}
${design === 'bento' ? '- Estética: Bento Box. Organização em grelha, cantos muito arredondados e aspeto de dashboard.' : ''}

[LAYOUT: ${layout.toUpperCase()}]
${layout === 'kanban' ? '- Estrutura: Quadro Kanban (A Fazer, Em Curso, Concluído).' : ''}
${layout === 'list' ? '- Estrutura: Lista vertical organizada.' : ''}

[FEATURES]
- CRUD LocalStorage.
${features.includes('priorities') ? '- Prioridades com cores.' : ''}
${features.includes('drag') ? '- Drag & Drop.' : ''}
${features.includes('search') ? '- Pesquisa em tempo real.' : ''}

[OUTPUT]
Apenas o código completo em App.tsx.`;
            };

            return (
                <div className="brutalist-card">
                    <h1>Starter Builder</h1>
                    <p className="subtitle">O Maestro dos Prompts // Imersão IA Portugal</p>

                    <div className="section-title">
                        <i data-lucide="palette"></i> 01. ESCOLHE A TUA VIBE (UAU!)
                    </div>
                    <div className="grid">
                        <div className={`option-button ${design === 'brutalist' ? 'active' : ''}`} onClick={() => setDesign('brutalist')}>
                            <h3>BRUTALISTA</h3>
                            <p>Contraste alto e sombras duras.</p>
                        </div>
                        <div className={`option-button ${design === 'minimal' ? 'active' : ''}`} onClick={() => setDesign('minimal')}>
                            <h3>MINIMALISTA</h3>
                            <p>Limpo, leve e profissional.</p>
                        </div>
                        <div className={`option-button ${design === 'glass' ? 'active' : ''}`} onClick={() => setDesign('glass')}>
                            <h3>GLASSMORPH</h3>
                            <p>Vidro, blurs e estilo Apple.</p>
                        </div>
                        <div className={`option-button ${design === 'gastro' ? 'active' : ''}`} onClick={() => setDesign('gastro')}>
                            <h3>NEO-GASTRO</h3>
                            <p>Luxo: Ouro sobre Preto.</p>
                        </div>
                        <div className={`option-button ${design === 'bento' ? 'active' : ''}`} onClick={() => setDesign('bento')}>
                            <h3>BENTO BOX</h3>
                            <p>Grelha organizada e moderna.</p>
                        </div>
                    </div>

                    <div className="section-title">
                        <i data-lucide="layout"></i> 02. LAYOUT DO GESTOR
                    </div>
                    <div className="grid">
                        <div className={`option-button ${layout === 'kanban' ? 'active' : ''}`} onClick={() => setLayout('kanban')}>
                            <h3>KANBAN</h3>
                            <p>Colunas (A Fazer, Em Curso, Feito).</p>
                        </div>
                        <div className={`option-button ${layout === 'list' ? 'active' : ''}`} onClick={() => setLayout('list')}>
                            <h3>LISTA</h3>
                            <p>Vista vertical clássica.</p>
                        </div>
                    </div>

                    <div className="section-title">
                        <i data-lucide="cpu"></i> 03. LOGICA EXTRA
                    </div>
                    <div className="grid">
                        <div className={`option-button ${features.includes('priorities') ? 'active' : ''}`} onClick={() => toggleFeature('priorities')}>
                            <h3>PRIORIDADES</h3>
                            <p>Sistema de cores por urgência.</p>
                        </div>
                        <div className={`option-button ${features.includes('drag') ? 'active' : ''}`} onClick={() => toggleFeature('drag')}>
                            <h3>DRAG & DROP</h3>
                            <p>Arrastar entre colunas.</p>
                        </div>
                    </div>

                    <button className="generate-btn" onClick={() => setShowPrompt(true)}>
                        Gerar Prompt Premium 🚀
                    </button>

                    {showPrompt && (
                        <div className="prompt-result">
                            <div className="section-title">PROMPT PRONTO</div>
                            <pre className="prompt-text">{generatePrompt()}</pre>
                            <button className="generate-btn" style={{marginTop: '20px', background: '#000', color: 'var(--primary)', borderColor: 'var(--primary)'}} onClick={() => {
                                navigator.clipboard.writeText(generatePrompt());
                                alert('Copiado!');
                            }}>
                                Copiar Prompt
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<StarterBuilder />);
        setTimeout(() => lucide.createIcons(), 200);
    </script>
</body>
</html>
